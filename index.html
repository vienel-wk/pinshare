<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PinShare - Berbagi Inspirasi</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/feed.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-dot"></span>
      PinShare
    </a>

    <a href="index.html" class="nav-link active">Beranda</a>
    <a href="#pinGrid" class="nav-link">Jelajah</a>

    <form class="nav-search" id="searchForm">
      <span class="nav-search-icon">Cari</span>
      <input type="search" id="searchInput" placeholder="Cari ide, inspirasi, proyek...">
    </form>

    <div class="nav-actions">
      <a href="upload.html" class="btn-primary">+ Buat Pin</a>
      <button class="notif-btn" id="notifBtn" type="button" title="Notifikasi">
        !
        <span class="notif-badge" id="notifBadge">3</span>
      </button>
      <div class="user-menu-wrap">
        <button class="avatar-btn" id="avatarBtn" type="button" style="background:#e60023;">AK</button>
        <div class="user-dropdown" id="userDropdown">
          <a href="profile.html" class="dropdown-item">Profil Saya</a>
          <a href="#pinGrid" class="dropdown-item">Pin Tersimpan</a>
          <a href="#settings" class="dropdown-item">Pengaturan</a>
          <div class="dropdown-divider"></div>
          <a href="login.html" class="dropdown-item danger">Keluar</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="categories-bar" id="categoryBar">
    <button class="pill active" data-cat="semua">Semua</button>
    <button class="pill" data-cat="desain">Desain</button>
    <button class="pill" data-cat="teknologi">Teknologi</button>
    <button class="pill" data-cat="fotografi">Fotografi</button>
    <button class="pill" data-cat="arsitektur">Arsitektur</button>
    <button class="pill" data-cat="makanan">Makanan</button>
    <button class="pill" data-cat="fashion">Fashion</button>
    <button class="pill" data-cat="seni">Seni</button>
    <button class="pill" data-cat="perjalanan">Perjalanan</button>
    <button class="pill" data-cat="diy">DIY</button>
  </div>

  <main class="main-content">
    <div class="search-info hidden" id="searchInfo"></div>
    <div class="masonry-grid" id="pinGrid"></div>

    <div class="empty-state hidden" id="emptyState">
      <div class="empty-icon">?</div>
      <h3>Tidak ada pin ditemukan</h3>
      <p>Coba kata kunci lain atau pilih kategori berbeda.</p>
    </div>

    <div style="text-align:center;margin:24px 0 48px;">
      <button class="btn-outline" id="loadMoreBtn" type="button">Muat Lebih Banyak</button>
    </div>
  </main>

  <div class="modal hidden" id="pinModal">
    <div class="modal-box pin-modal-box">
      <div class="modal-header">
        <h3 id="modalTitle">Judul Pin</h3>
        <button class="modal-close" id="closeModal" type="button">x</button>
      </div>
      <div class="modal-body pin-modal-body">
        <img src="" alt="" id="modalImg" class="pin-modal-img">
        <p class="pin-detail-desc" id="modalDesc"></p>
        <div class="pin-author">
          <div class="pin-author-av-default" id="modalAvatar" style="background:#e60023;">AK</div>
          <div class="pin-author-info">
            <div class="pin-author-name" id="modalUser">Pengguna</div>
            <div class="pin-author-bio">Kreator PinShare</div>
          </div>
          <button class="btn-outline" id="followBtn" type="button">Ikuti</button>
        </div>
        <div class="pin-detail-actions">
          <button class="like-btn-large" id="modalLikeBtn" type="button">Suka <span id="modalLikeCount">0</span></button>
          <button class="btn-outline" id="modalSaveBtn" type="button">Simpan</button>
          <button class="btn-outline" id="modalShareBtn" type="button">Bagikan</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="notifModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Notifikasi</h3>
        <button class="modal-close" id="closeNotif" type="button">x</button>
      </div>
      <div class="modal-body">
        <div class="notif-list" id="notifList"></div>
      </div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>
  <a href="upload.html" class="fab" title="Buat Pin Baru">+</a>

  <script src="js/static-app.js"></script>
</body>
</html>
