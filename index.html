<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PinShare - Berbagi Inspirasi</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/feed.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <div class="nav-left">
      <a href="index.html" class="logo">
        <span class="logo-dot"></span> PinShare
      </a>
      <a href="index.html" class="nav-link active">Beranda</a>
      <a href="explore.html" class="nav-link">Jelajah</a>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Cari ide, inspirasi, proyek..." class="search-input">
      <button id="searchBtn" class="search-clear" title="Cari">⌕</button>
    </div>

    <div class="nav-right">
      <a href="upload.html" class="btn-primary">+ Buat Pin</a>
      <div class="nav-icons">
        <button class="icon-nav" id="notifBtn" title="Notifikasi">
          🔔<span class="badge" id="notifBadge">3</span>
        </button>
        <button class="icon-nav" id="msgBtn" title="Pesan">💬</button>
      </div>
      <div class="avatar-wrap" id="avatarMenu">
        <div class="avatar" id="userAvatar">AK</div>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="profile.html">👤 Profil Saya</a>
          <a href="saved.html">🔖 Pin Tersimpan</a>
          <a href="settings.html">⚙️ Pengaturan</a>
          <hr>
          <a href="login.html" class="logout-link" id="logoutBtn">🚪 Keluar</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===== KATEGORI PILLS ===== -->
  <div class="categories-bar">
    <div class="categories-scroll">
      <button class="pill active" data-cat="semua">Semua</button>
      <button class="pill" data-cat="desain">🎨 Desain</button>
      <button class="pill" data-cat="teknologi">💻 Teknologi</button>
      <button class="pill" data-cat="fotografi">📷 Fotografi</button>
      <button class="pill" data-cat="arsitektur">🏠 Arsitektur</button>
      <button class="pill" data-cat="makanan">🍳 Makanan</button>
      <button class="pill" data-cat="fashion">👗 Fashion</button>
      <button class="pill" data-cat="seni">🖼️ Seni</button>
      <button class="pill" data-cat="perjalanan">✈️ Perjalanan</button>
      <button class="pill" data-cat="olahraga">⚽ Olahraga</button>
      <button class="pill" data-cat="musik">🎵 Musik</button>
      <button class="pill" data-cat="diy">🔧 DIY</button>
    </div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">
    <!-- Loading Skeleton -->
    <div class="masonry-grid" id="skeletonGrid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card tall"></div>
      <div class="skeleton-card medium"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card tall"></div>
      <div class="skeleton-card medium"></div>
      <div class="skeleton-card tall"></div>
      <div class="skeleton-card"></div>
    </div>

    <!-- Pin Grid -->
    <div class="masonry-grid" id="pinGrid" style="display:none;"></div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">🔍</div>
      <h3>Tidak ada pin ditemukan</h3>
      <p>Coba kata kunci lain atau pilih kategori berbeda</p>
    </div>

    <!-- Load More -->
    <div class="load-more-wrap">
      <button class="btn-outline" id="loadMoreBtn">Muat Lebih Banyak</button>
    </div>
  </main>

  <!-- ===== MODAL DETAIL PIN ===== -->
  <div class="modal-overlay" id="pinModal">
    <div class="modal-container">
      <button class="modal-close" id="closeModal">✕</button>
      <div class="modal-inner">
        <div class="modal-img-wrap">
          <img src="" alt="" id="modalImg" class="modal-img">
          <div class="modal-img-actions">
            <button class="btn-icon-lg" id="modalLikeBtn" title="Suka">❤️ <span id="modalLikeCount">0</span></button>
            <button class="btn-icon-lg" id="modalSaveBtn" title="Simpan">🔖 Simpan</button>
            <button class="btn-icon-lg" id="modalShareBtn" title="Bagikan">🔗 Bagikan</button>
          </div>
        </div>
        <div class="modal-info">
          <div class="modal-header">
            <div class="modal-user">
              <div class="modal-avatar" id="modalUserAvatar">AK</div>
              <div>
                <p class="modal-username" id="modalUsername">Pengguna</p>
                <p class="modal-user-sub">20 pengikut</p>
              </div>
              <button class="btn-follow" id="modalFollowBtn">Ikuti</button>
            </div>
          </div>
          <h2 class="modal-title" id="modalTitle">Judul Pin</h2>
          <p class="modal-desc" id="modalDesc">Deskripsi pin</p>
          <div class="modal-tags" id="modalTags"></div>

          <!-- Komentar -->
          <div class="comments-section">
            <h3 class="comments-title">Komentar (<span id="commentCount">0</span>)</h3>
            <div class="comments-list" id="commentsList"></div>
            <div class="comment-form">
              <div class="comment-input-wrap">
                <div class="comment-avatar">AK</div>
                <input type="text" id="commentInput" placeholder="Tambahkan komentar..." class="comment-input">
                <button id="submitComment" class="comment-submit">Kirim</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== NOTIFIKASI PANEL ===== -->
  <div class="notif-panel" id="notifPanel">
    <div class="notif-header">
      <h3>Notifikasi</h3>
      <button id="markAllRead">Tandai semua dibaca</button>
    </div>
    <div class="notif-list" id="notifList"></div>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ===== FAB ===== -->
  <a href="upload.html" class="fab" title="Buat Pin Baru">+</a>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/feed.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
