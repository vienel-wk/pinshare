<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - PinShare</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/feed.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-logo">
        <h1>PinShare</h1>
        <p>Masuk untuk menyimpan inspirasi favoritmu.</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" type="button">Masuk</button>
        <button class="auth-tab" type="button">Daftar</button>
      </div>
      <form id="demoLogin">
        <div class="form-group">
          <label for="email">Email</label>
          <input class="form-control" id="email" type="email" placeholder="email@kamu.com">
        </div>
        <div class="form-group">
          <label for="password">Kata sandi</label>
          <input class="form-control" id="password" type="password" placeholder="Kata sandi">
        </div>
        <button class="btn-primary" type="submit" style="width:100%;justify-content:center;">Masuk Demo</button>
      </form>
      <p class="auth-footer">Versi GitHub Pages ini berjalan tanpa database. <a href="index.html">Kembali ke beranda</a></p>
    </section>
  </main>
  <div class="toast hidden" id="toast"></div>
  <script src="js/static-upload.js"></script>
</body>
</html>
