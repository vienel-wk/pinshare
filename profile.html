<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - PinShare</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/feed.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body data-require-auth>
  <nav class="navbar">
    <a href="index.html" class="nav-logo"><span class="nav-logo-dot"></span> PinShare</a>
    <a href="index.html" class="nav-link">Beranda</a>
    <a href="upload.html" class="btn-primary">+ Buat Pin</a>
    <div class="nav-actions">
      <a href="login.html" class="btn-outline" data-auth-guest>Masuk</a>
      <button class="btn-outline hidden" type="button" data-logout data-auth-user>Keluar</button>
    </div>
  </nav>

  <header class="profile-header">
    <div class="profile-avatar-default" style="background:#e60023;">AK</div>
    <h1 class="profile-name">Ahmad Kurniawan</h1>
    <p class="profile-username">@ahmadtkj</p>
    <p class="profile-bio">Siswa SMK TKJ, suka coding dan desain.</p>
    <div class="profile-stats">
      <div class="stat-item"><span class="stat-number" id="profilePinCount">0</span><span class="stat-label">Pin</span></div>
      <div class="stat-item"><span class="stat-number">128</span><span class="stat-label">Pengikut</span></div>
      <div class="stat-item"><span class="stat-number">57</span><span class="stat-label">Mengikuti</span></div>
    </div>
    <div class="profile-actions">
      <button class="btn-primary" type="button">Edit Profil</button>
      <a href="index.html" class="btn-outline">Lihat Pin</a>
    </div>
  </header>

  <div class="profile-tabs">
    <button class="profile-tab active" type="button" data-profile-tab="mine">Pin Saya</button>
    <button class="profile-tab" type="button" data-profile-tab="saved">Tersimpan</button>
    <button class="profile-tab" type="button" data-profile-tab="boards">Board</button>
  </div>

  <main class="main-content">
    <div class="masonry-grid" id="profilePinGrid"></div>
    <div class="empty-state hidden" id="profileEmptyState">
      <div class="empty-icon">+</div>
      <h3 id="profileEmptyTitle">Belum ada pin</h3>
      <p id="profileEmptyText">Upload foto pertama kamu agar muncul di Pin Saya.</p>
      <a href="upload.html" class="btn-primary" id="profileEmptyAction">+ Buat Pin</a>
    </div>
  </main>
  <script src="js/static-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/static-profile.js"></script>
</body>
</html>
