<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - PinShare</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/feed.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo"><span class="nav-logo-dot"></span> PinShare</a>
    <a href="index.html" class="nav-link">Beranda</a>
    <a href="upload.html" class="btn-primary">+ Buat Pin</a>
    <div class="nav-actions">
      <a href="login.html" class="btn-outline" data-auth-guest>Masuk</a>
      <button class="btn-outline hidden" type="button" data-logout data-auth-user>Keluar</button>
    </div>
  </nav>

  <header class="profile-header">
    <div class="profile-avatar-default" style="background:#e60023;">AK</div>
    <h1 class="profile-name">Ahmad Kurniawan</h1>
    <p class="profile-username">@ahmadtkj</p>
    <p class="profile-bio">Siswa SMK TKJ, suka coding dan desain.</p>
    <div class="profile-stats">
      <div class="stat-item"><span class="stat-number">24</span><span class="stat-label">Pin</span></div>
      <div class="stat-item"><span class="stat-number">128</span><span class="stat-label">Pengikut</span></div>
      <div class="stat-item"><span class="stat-number">57</span><span class="stat-label">Mengikuti</span></div>
    </div>
    <div class="profile-actions">
      <button class="btn-primary" type="button">Edit Profil</button>
      <a href="index.html" class="btn-outline">Lihat Pin</a>
    </div>
  </header>

  <div class="profile-tabs">
    <button class="profile-tab active" type="button">Pin Saya</button>
    <button class="profile-tab" type="button">Tersimpan</button>
    <button class="profile-tab" type="button">Board</button>
  </div>

  <main class="main-content">
    <div class="masonry-grid">
      <article class="pin-card">
        <div class="pin-image-wrap">
          <div class="pin-placeholder" style="background:#f6d7df;"><span>Desain</span></div>
        </div>
        <div class="pin-info"><h2 class="pin-title">Inspirasi ruang kerja minimalis</h2></div>
      </article>
      <article class="pin-card">
        <div class="pin-image-wrap">
          <div class="pin-placeholder" style="background:#d7e7f6;"><span>Fotografi</span></div>
        </div>
        <div class="pin-info"><h2 class="pin-title">Referensi foto produk kreatif</h2></div>
      </article>
    </div>
  </main>
  <script src="js/static-auth.js"></script>
</body>
</html>
