<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buat Pin - PinShare</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/feed.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body data-require-auth>
  <nav class="navbar">
    <a href="index.html" class="nav-logo"><span class="nav-logo-dot"></span> PinShare</a>
    <a href="index.html" class="nav-link">Beranda</a>
    <div class="nav-actions">
      <a href="index.html" class="btn-outline">Tutup</a>
    </div>
  </nav>

  <main class="upload-page">
    <h2>Buat Pin Baru</h2>
    <div class="upload-layout">
      <label class="upload-preview-area" id="uploadArea">
        <img id="previewImg" alt="Preview" style="display:none;">
        <div class="upload-placeholder" id="uploadPlaceholder">
          <div class="upload-icon">+</div>
          <h4>Pilih gambar</h4>
          <p>Preview akan muncul di sini. Setelah diterbitkan, foto masuk ke Profil > Pin Saya.</p>
        </div>
        <input type="file" id="fileInput" accept="image/*">
      </label>

      <section class="upload-form-card">
        <div class="form-group">
          <label for="pinTitle">Judul</label>
          <input class="form-control" id="pinTitle" type="text" placeholder="Judul pin">
        </div>
        <div class="form-group">
          <label for="pinDesc">Deskripsi</label>
          <textarea class="form-control" id="pinDesc" placeholder="Ceritakan tentang pin ini"></textarea>
        </div>
        <div class="form-group">
          <label for="pinCategory">Kategori</label>
          <select class="form-control" id="pinCategory">
            <option>Desain</option>
            <option>Teknologi</option>
            <option>Fotografi</option>
            <option>Arsitektur</option>
            <option>Makanan</option>
          </select>
        </div>
        <button class="btn-primary" id="publishDemo" type="button">Terbitkan Pin</button>
      </section>
    </div>
  </main>

  <div class="toast hidden" id="toast"></div>
  <script src="js/static-auth.js"></script>
  <script src="js/static-upload.js"></script>
</body>
</html>
